<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNITYCODE — Сеть</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    body::before { display: none; }

    header { flex-shrink: 0; position: relative; z-index: 1000; background: rgba(0,0,0,0.98); }

    .status-bar {
      display: flex; gap: 2rem;
      padding: 0.6rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.95);
      flex-shrink: 0; z-index: 999;
    }
    .stat        { display: flex; align-items: center; gap: 0.5rem; }
    .stat-label  { font-size: 0.55rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; }
    .stat-val    { font-size: 0.7rem; color: var(--accent); }

    #map { flex: 1; position: relative; z-index: 1; }

    .leaflet-container { background: #050a05 !important; font-family: 'Share Tech Mono', monospace; }
    .leaflet-tile-pane { filter: brightness(0.3) saturate(0) hue-rotate(120deg); }

    .node-marker {
      width: 10px; height: 10px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(0,255,136,0.3);
      animation: node-pulse 2s ease-in-out infinite; cursor: pointer;
    }
    @keyframes node-pulse {
      0%,100% { box-shadow: 0 0 10px var(--accent); }
      50%     { box-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,255,136,0.2); }
    }

    .leaflet-popup-content-wrapper {
      background: rgba(0,0,0,0.95) !important;
      border: 1px solid rgba(0,255,136,0.3) !important;
      border-radius: 0 !important; color: var(--white) !important;
      padding: 0 !important;
      box-shadow: 0 0 20px rgba(0,255,136,0.1) !important;
    }
    .leaflet-popup-tip { background: rgba(0,0,0,0.95) !important; }

    .popup-content { padding: 1.2rem; min-width: 240px; max-width: 300px; }
    .popup-tag     { font-size: 0.55rem; color: var(--accent); letter-spacing: 0.2em; margin-bottom: 0.6rem; }
    .popup-text    { font-size: 0.75rem; line-height: 1.6; color: rgba(255,255,255,0.7); margin-bottom: 0.8rem; max-height: 120px; overflow-y: auto; }
    .popup-time    { font-size: 0.55rem; color: var(--dim); }
    .popup-btn {
      display: inline-block; margin-top: 0.8rem;
      padding: 0.4rem 0.8rem;
      border: 1px solid rgba(0,255,136,0.3);
      color: var(--accent); font-size: 0.6rem; letter-spacing: 0.1em;
      cursor: pointer; background: transparent; text-transform: uppercase;
      transition: background 0.2s, color 0.2s; text-decoration: none;
    }
    .popup-btn:hover { background: var(--accent); color: var(--black); }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">UNITYCODE // СЕТЬ</a>
  <nav>
    <a href="index.html">Имплант</a>
    <a href="virus.html">Диагностика</a>
    <a href="petlya.html">Петля</a>
    <a href="set.html">Сеть</a>
    <a href="kod.html">Код</a>
  </nav>
</header>

<div class="status-bar">
  <div class="stat"><span class="stat-label">Узлов в сети:</span><span class="stat-val" id="nodeCount">—</span></div>
  <div class="stat"><span class="stat-label">Активны сейчас:</span><span class="stat-val" id="activeCount">1</span></div>
  <div class="stat"><span class="stat-label">Пульс сети:</span><span class="stat-val" id="pulse">●</span></div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="nav.js"></script>
<script>
const SUPABASE_URL = 'https://lukyyqabkxzrgdixzphs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_c94zOuVnId_NFhHZgRzQ2Q_h3tljPjf';

const map = L.map('map', {
  center: [20, 20], zoom: 2,
  zoomControl: false, attributionControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

// Центрируем на пользователя
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 5);
  });
}

const nodeIcon = () => L.divIcon({
  className: '', html: '<div class="node-marker"></div>',
  iconSize: [10, 10], iconAnchor: [5, 5]
});

function timeAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60)    return 'только что';
  if (diff < 3600)  return Math.floor(diff / 60) + ' мин. назад';
  if (diff < 86400) return Math.floor(diff / 3600) + ' ч. назад';
  return Math.floor(diff / 86400) + ' дн. назад';
}

async function loadNodes() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/nodes?select=id,created_at,ai_interpretation,lat,lng&lat=not.is.null&lng=not.is.null&order=created_at.desc`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
        }
      }
    );

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const nodes = await res.json();

    nodes.forEach(node => {
      L.marker([node.lat, node.lng], { icon: nodeIcon() })
        .addTo(map)
        .bindPopup(`
          <div class="popup-content">
            <div class="popup-tag">// УЗЕЛ СЕТИ</div>
            <div class="popup-text">${node.ai_interpretation}</div>
            <div class="popup-time">${timeAgo(node.created_at)}</div>
            <a href="petlya.html" class="popup-btn">Получить сигнал →</a>
          </div>`, { className: '' });
    });

    document.getElementById('nodeCount').textContent = nodes.length;

  } catch (e) {
    console.error('Supabase error:', e);
    document.getElementById('nodeCount').textContent = '?';
  }
}

loadNodes();

// Пульс
let pulseState = true;
setInterval(() => {
  document.getElementById('pulse').style.color = (pulseState = !pulseState) ? 'var(--accent)' : 'var(--dim)';
}, 1500);

// Счётчик активных
setInterval(() => {
  document.getElementById('activeCount').textContent = Math.floor(1 + Math.random() * 8);
}, 5000);
</script>
</body>
</html>
