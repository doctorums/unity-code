<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UNITYCODE — Туннель</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#061120;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;}
  button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.35);color:white;font-size:1.8rem;padding:1rem 2.5rem;letter-spacing:0.2em;backdrop-filter:blur(12px);cursor:pointer;}
  canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:none;pointer-events:none;z-index:200;}
</style>
</head>
<body>
<button id="btn">[ ВОЙТИ В СЕТЬ ]</button>
<canvas id="tunnel"></canvas>
<script>
(function(){
  const canvas = document.getElementById('tunnel');
  const ctx = canvas.getContext('2d');
  let active = false, start = 0;
  const DUR = 2500;

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function go(e){
    e.preventDefault();
    e.stopPropagation();
    if(active) return;
    active = true;
    start = performance.now();
    canvas.style.display = 'block';
  }

  document.getElementById('btn').addEventListener('click', go);
  document.getElementById('btn').addEventListener('touchstart', go, {passive:false});

  function animate(now){
    if(active){
      let p = (now - start)/DUR;
      if(p>1) p=1;
      const ease = 1 - Math.pow(1-p, 2.5);
      const w = canvas.width, h = canvas.height;
      const cx = w/2, cy = h/2;
      const maxR = Math.hypot(cx, cy)*1.5;

      ctx.clearRect(0,0,w,h);
      for(let i=0;i<48;i++){
        const ang = (i/48)*Math.PI*2;
        const ox = cx+Math.cos(ang)*maxR;
        const oy = cy+Math.sin(ang)*maxR;
        const ix = cx+Math.cos(ang)*(maxR*(1-ease));
        const iy = cy+Math.sin(ang)*(maxR*(1-ease));
        ctx.beginPath();
        ctx.moveTo(ox,oy);
        ctx.lineTo(ix,iy);
        ctx.strokeStyle = `rgba(90,185,250,${Math.min(0.9, ease*2)})`;
        ctx.lineWidth = Math.max(0.8, (1-ease)*3+0.5);
        ctx.stroke();
      }
      if(ease>0.1){
        const r = Math.max(1, 45*(1-ease));
        const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
        grad.addColorStop(0,`rgba(255,255,255,${ease})`);
        grad.addColorStop(1,`rgba(90,185,250,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.fill();
      }
      if(p>0.7){
        const flash = (p-0.7)/0.3;
        if(flash<=0.6) ctx.fillStyle = `rgba(255,255,255,${flash/0.6})`;
        else ctx.fillStyle = `rgba(6,17,32,${(flash-0.6)/0.4})`;
        ctx.fillRect(0,0,w,h);
      }
      if(p>=1){
        active=false;
        canvas.style.display='none';
      }
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
