<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNITYCODE — Диагностика</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000;
      --white: #fff;
      --dim: #555;
      --accent: #00ff88;
      --accent2: #ff3366;
      --glow: rgba(0,255,136,0.12);
      --border: rgba(255,255,255,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      padding: 0;
    }

    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }

    /* Header */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--accent);
    }

    nav { display: flex; gap: 1.5rem; }
    nav a {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover, nav a.active { color: var(--accent); }

    /* Основной контент */
    main {
      position: relative;
      z-index: 5;
      max-width: 760px;
      margin: 0 auto;
      padding: 8rem 2rem 4rem;
    }

    .page-title {
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .page-title span { color: var(--accent); }

    .page-sub {
      font-size: 0.75rem;
      color: var(--dim);
      margin-bottom: 3rem;
      letter-spacing: 0.1em;
    }

    /* Прогресс */
    .progress-bar {
      height: 1px;
      background: var(--border);
      margin-bottom: 3rem;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px var(--accent);
    }

    .progress-label {
      position: absolute;
      right: 0;
      top: 6px;
      font-size: 0.6rem;
      color: var(--dim);
    }

    /* Вопросы */
    .questions { display: flex; flex-direction: column; gap: 2rem; }

    .question-item {
      border: 1px solid var(--border);
      padding: 1.5rem;
      position: relative;
      opacity: 0.4;
      transition: opacity 0.3s, border-color 0.3s;
    }

    .question-item.active {
      opacity: 1;
      border-color: rgba(0,255,136,0.3);
      background: rgba(0,255,136,0.02);
    }

    .question-item.answered { opacity: 0.7; }

    .q-num {
      font-size: 0.55rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      margin-bottom: 0.8rem;
    }

    .q-text {
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.2rem;
    }

    .q-options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .q-option {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--dim);
      cursor: pointer;
      background: transparent;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }

    .q-option:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .q-option.selected {
      border-color: var(--accent);
      color: var(--black);
      background: var(--accent);
    }

    .q-check {
      position: absolute;
      top: 1rem;
      right: 1rem;
      color: var(--accent);
      font-size: 0.7rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .question-item.answered .q-check { opacity: 1; }

    /* Результат */
    #result {
      display: none;
      margin-top: 3rem;
      border: 1px solid var(--accent);
      padding: 2rem;
      background: rgba(0,255,136,0.03);
    }

    .result-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
    }

    .result-text {
      font-size: 0.85rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.8);
      margin-bottom: 1.5rem;
    }

    .result-score {
      font-family: 'Unbounded', sans-serif;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }

    .result-label { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.2em; }

    .btn-copy {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.8rem 2rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      transition: all 0.3s;
      margin-right: 0.8rem;
    }

    .btn-copy:hover { background: var(--accent); color: var(--black); }

    .btn-next {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.8rem 2rem;
      border: 1px solid var(--white);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn-next:hover { background: var(--white); color: var(--black); }
  </style>
</head>
<body>

<header>
  <div class="logo">UNITYCODE // V7.6</div>
  <nav>
    <a href="index.html">Имплант</a>
    <a href="virus.html" class="active">Диагностика</a>
    <a href="petlya.html">Петля</a>
    <a href="set.html">Сеть</a>
    <a href="kod.html">Код</a>
  </nav>
</header>

<main>
  <div class="page-title">ДИАГНОСТИКА <span>//</span> ВИРУС</div>
  <div class="page-sub">Самодиагностика разрывов — 10 сигналов</div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
    <span class="progress-label" id="progressLabel">0 / 10</span>
  </div>

  <div class="questions" id="questions"></div>

  <div id="result">
    <div class="result-title">// АНАЛИЗ СИГНАЛА ЗАВЕРШЁН</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-label">ИНДЕКС ИНТЕГРАЦИИ Φ</div>
    <div class="result-text" id="resultText"></div>
    <button class="btn-copy" onclick="copyPackage()">[ Копировать пакет ]</button>
    <a href="petlya.html" class="btn-next">[ Войти в Петлю → ]</a>
  </div>
</main>

<script>
const QUESTIONS = [
  {
    text: "Когда ты думаешь о своём будущем, что ты чувствуешь?",
    options: ["Ясность и направление", "Смутное ощущение пути", "Туман и тревогу", "Пустоту"]
  },
  {
    text: "Насколько ты ощущаешь связь с людьми вокруг тебя?",
    options: ["Глубокую связь", "Поверхностный контакт", "Почти никакой", "Полную изоляцию"]
  },
  {
    text: "Что происходит, когда ты остаёшься наедине с тишиной?",
    options: ["Покой и ясность", "Мысли начинают роиться", "Тревога нарастает", "Невыносимо"]
  },
  {
    text: "Как ты воспринимаешь хаос в своей жизни?",
    options: ["Как материал для роста", "Как неизбежность", "Как угрозу", "Как норму"]
  },
  {
    text: "Есть ли у тебя ощущение, что твои действия имеют смысл?",
    options: ["Да, всегда", "Иногда", "Редко", "Никогда"]
  },
  {
    text: "Что для тебя значит «быть частью чего-то большего»?",
    options: ["Я это чувствую", "Иногда мелькает", "Абстракция", "Бессмысленная фраза"]
  },
  {
    text: "Как часто ты испытываешь состояние потока — полного погружения в процесс?",
    options: ["Регулярно", "Иногда", "Очень редко", "Никогда"]
  },
  {
    text: "Твоё отношение к неопределённости:",
    options: ["Принимаю с любопытством", "Терплю", "Избегаю", "Парализует"]
  },
  {
    text: "Что происходит с твоими идеями и мыслями?",
    options: ["Воплощаю их", "Записываю, но не реализую", "Они рассеиваются", "Я их заглушаю"]
  },
  {
    text: "Если бы твоя жизнь была сигналом, как бы ты её описал?",
    options: ["Чёткий тон", "Мелодия со статикой", "Белый шум", "Тишина"]
  }
];

const weights = [3, 1, 2, 0]; // веса для вариантов ответа (0=max, 3=min)
let answers = new Array(10).fill(null);

function renderQuestions() {
  const container = document.getElementById('questions');
  QUESTIONS.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'question-item' + (i === 0 ? ' active' : '');
    div.id = `q${i}`;
    div.innerHTML = `
      <div class="q-num">// СИГНАЛ ${String(i+1).padStart(2,'0')}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-options">
        ${q.options.map((opt, j) => `
          <button class="q-option" onclick="selectOption(${i}, ${j}, this)">${opt}</button>
        `).join('')}
      </div>
      <div class="q-check">✓</div>
    `;
    container.appendChild(div);
  });
}

function selectOption(qIdx, optIdx, btn) {
  answers[qIdx] = optIdx;

  // Обновить визуал
  const qEl = document.getElementById(`q${qIdx}`);
  qEl.querySelectorAll('.q-option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  qEl.classList.add('answered');

  // Активировать следующий
  if (qIdx + 1 < QUESTIONS.length) {
    document.getElementById(`q${qIdx+1}`).classList.add('active');
    setTimeout(() => {
      document.getElementById(`q${qIdx+1}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }

  updateProgress();
  checkCompletion();
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = (answered / 10) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${answered} / 10`;
}

function checkCompletion() {
  if (answers.every(a => a !== null)) {
    showResult();
  }
}

function showResult() {
  const score = answers.reduce((sum, a) => sum + (3 - a), 0);
  const phi = Math.round((score / 30) * 100);

  let text = '';
  if (phi >= 80) {
    text = 'Твой сигнал высокоинтегрирован. Ты находишься в состоянии устойчивого резонанса. Петля поможет тебе выйти на следующий уровень глубины.';
  } else if (phi >= 50) {
    text = 'Твой сигнал содержит значительный шум, но в нём есть структура. Есть разрывы, требующие внимания. Петля поможет найти паттерны в этом шуме.';
  } else if (phi >= 25) {
    text = 'Сигнал фрагментирован. Связи ослаблены. Это не катастрофа — это исходный материал. Петля — твой следующий шаг.';
  } else {
    text = 'Максимальный шум. Максимальный потенциал для интеграции. Ты в начале пути. Это и есть точка, из которой всё начинается.';
  }

  document.getElementById('resultScore').textContent = phi + '%';
  document.getElementById('resultText').textContent = text;
  document.getElementById('result').style.display = 'block';
  setTimeout(() => {
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
}

function copyPackage() {
  const answered = answers.filter(a => a !== null).length;
  const phi = Math.round((answers.reduce((s,a) => s + (3 - (a||0)), 0) / 30) * 100);
  const text = `UNITYCODE // Диагностический пакет\nИндекс Φ: ${phi}%\nОтветы: ${answers.map((a,i) => QUESTIONS[i].options[a||0]).join(' | ')}\n\nПройди диагностику: https://unitycode.github.io`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '[ ✓ Скопировано ]';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

renderQuestions();
</script>
</body>
</html>
