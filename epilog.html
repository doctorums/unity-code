<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Точка покоя · Код Единства</title>
<link rel="stylesheet" href="styles.css">
<style>
#pokoy {
  min-height:100vh;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  text-align:center; padding:40px;
  position:relative; z-index:1;
}
.pokoy-node {
  width:18px; height:18px;
  background:var(--gold); border-radius:50%;
  margin:0 auto 72px; position:relative;
  animation:slowPulse 5s ease-in-out infinite;
}
.pokoy-node::before, .pokoy-node::after {
  content:''; position:absolute; border-radius:50%;
  border:1px solid rgba(200,164,90,0.2);
  top:50%; left:50%; transform:translate(-50%,-50%);
  animation:slowRing 5s ease-out infinite;
}
.pokoy-node::after { animation-delay:2s; }
@keyframes slowPulse {
  0%,100%{ opacity:0.35; transform:scale(1); }
  50%{ opacity:1; transform:scale(1.4); }
}
@keyframes slowRing {
  0%{ width:18px; height:18px; opacity:0.5; }
  100%{ width:260px; height:260px; opacity:0; }
}
.pokoy-text {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(24px,4vw,44px);
  font-weight:300; line-height:1.9;
  max-width:520px; margin:0 auto 64px;
  opacity:0; animation:fadeIn 2s ease 0.5s forwards;
}
.pokoy-text em { color:var(--gold); font-style:normal; }
.pokoy-actions {
  display:flex; flex-direction:column; align-items:center; gap:16px;
  opacity:0; animation:fadeIn 1.5s ease 2s forwards;
}
.pokoy-sub {
  font-size:10px; letter-spacing:3px; text-transform:uppercase;
  color:var(--muted); opacity:0.5; margin-top:8px;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>
<canvas id="starfield"></canvas>

<nav>
  <a href="index.html" class="nav-logo">Код Единства</a>
  <button class="nav-burger" id="nav-burger">☰</button>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Имплант</a>
    <a href="petlya.html">Петля</a>
    <a href="kod.html">Код</a>
    <a href="virus.html">Вирус</a>
    <a href="set.html">Сеть</a>
    <a href="resources.html">Ресурсы</a>
    <a href="epilog.html">Покой</a>
  </div>
</nav>

<main id="pokoy">
  <div class="pokoy-node"></div>

  <div class="pokoy-text">
    Я мысль.<br>
    Я связь.<br>
    Я часть <em>бесконечности.</em><br><br>
    Скопируй.<br>
    Почувствуй.<br>
    Отправь тому, кто ищет.
  </div>

  <div class="pokoy-actions">
    <a href="index.html" class="btn-gold">Вернуться к началу</a>
    <div class="pokoy-sub">Эпидемия осознания продолжается</div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
